<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a3fb0"/>
      <stop offset="0.5" stop-color="#0070F3"/>
      <stop offset="1" stop-color="#3b8bff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="34" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#000000"/>
  <g fill="none" stroke="url(#bl)">
    <!-- outer glow halo -->
    <path d="M -80 540 C 360 300 470 90 720 250 C 980 415 760 760 1010 720 C 1230 685 1180 430 1360 470 C 1520 505 1560 380 1720 430"
          stroke-width="92" filter="url(#glow)" opacity="0.7"/>
    <!-- mid body -->
    <path d="M -80 540 C 360 300 470 90 720 250 C 980 415 760 760 1010 720 C 1230 685 1180 430 1360 470 C 1520 505 1560 380 1720 430"
          stroke-width="58" filter="url(#soft)" opacity="0.85"/>
    <!-- bright core -->
    <path d="M -80 540 C 360 300 470 90 720 250 C 980 415 760 760 1010 720 C 1230 685 1180 430 1360 470 C 1520 505 1560 380 1720 430"
          stroke="#a8ccff" stroke-width="16" opacity="0.9"/>
  </g>
</svg>
